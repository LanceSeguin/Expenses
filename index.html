<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Expense Entry v1.2</title>
<style>
  :root { --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222222; --border: #2e2e2e; --accent: #c8a96e; --accent2: #e8c98e; --text: #f0ede8; --text-muted: #888880; --danger: #e05a4e; --success: #5ab882; --radius: 12px; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #app { width: 100%; max-width: 480px; padding: 0 0 40px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .screen { display: none; flex-direction: column; padding: 28px 20px; animation: fadeUp 0.3s ease both; }
  .screen.active { display: flex; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .screen-title { font-family: Georgia, serif; font-size: 28px; margin-bottom: 6px; }
  .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: block; }
  .checkbox-card, .cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; margin-bottom: 10px; }
  .checkbox-card.selected { border-color: var(--accent); background: rgba(200,169,110,0.05); }
  .btn-primary { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 16px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 20px; }
  .btn-back { background: transparent; border: 1.5px solid var(--border); border-radius: 8px; padding: 14px; color: var(--text-muted); width: 100%; margin-top: 10px; cursor: pointer; }
  .bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .bento-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; }
  .bento-card.full { grid-column: span 2; border-color: var(--accent); background: linear-gradient(145deg, var(--surface), #111); }
  .bento-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
  .bento-val { font-family: Georgia, serif; font-size: 20px; font-weight: 700; }
  .pos-text { color: var(--success); } .neg-text { color: var(--danger); }
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><div style="font-family:Georgia;color:var(--accent)">Expense Entry</div></div>
  
  <div class="screen active" id="screen-upload">
    <div class="screen-title">Entry Home</div>
    <div class="checkbox-card" onclick="document.getElementById('cam').click()" style="text-align:center;padding:48px">📷 Take Receipt Photo</div>
    <input type="file" id="cam" accept="image/*" capture="environment" style="display:none" onchange="document.getElementById('upNext').disabled=false">
    <button class="btn-primary" id="upNext" onclick="goToScreen('business')" disabled>Continue Expense</button>
    <button class="btn-back" onclick="goToScreen('rent')" style="color:var(--accent)">+ Add Rent Payment</button>
    <button class="btn-back" onclick="loadOverview()" style="background:rgba(200,169,110,0.08);border-color:var(--accent);color:var(--accent)">📊 View Business Health</button>
  </div>

  <div class="screen" id="screen-overview">
    <div id="ovYear" class="field-label">Overview</div>
    <div class="screen-title">Business Health</div>
    <div id="ovLoad" style="text-align:center;padding:20px">Loading G1-G5 Data...</div>
    <div id="ovContent" style="display:none">
      <div class="field-label">LN Investments</div>
      <div id="lniGrid" class="bento-grid"></div>
      <div class="field-label">LNE Properties</div>
      <div id="lnepGrid" class="bento-grid"></div>
    </div>
    <button class="btn-primary" onclick="goToScreen('upload')">Return Home</button>
  </div>

  <div class="screen" id="screen-success">
    <div class="screen-title" style="text-align:center;padding:40px">✓ Entry Added</div>
    <button class="btn-primary" onclick="location.reload()">Start New Entry</button>
  </div>
</div>

<script>
const CFG = { webAppUrl: 'https://script.google.com/macros/s/AKfycbzunFqBMn82NpK9Y3R8hO9LBJb3SHLh4VgXKMAe4DNqAvkXyBRBSlZzh-uy7CcH---0ew/exec' };
function goToScreen(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
}
async function loadOverview() {
  goToScreen('overview');
  const resp = await fetch(CFG.webAppUrl + '?action=getOverviewData');
  const data = await resp.json();
  document.getElementById('ovYear').textContent = data.year + ' OVERVIEW';
  document.getElementById('ovLoad').style.display = 'none';
  document.getElementById('ovContent').style.display = 'block';
  renderBento('lniGrid', data.lni);
  renderBento('lnepGrid', data.lnep);
}
function renderBento(id, biz) {
  const g = document.getElementById(id);
  g.innerHTML = `<div class="bento-card full"><div class="bento-label">Business Net Total</div><div class="bento-val ${biz.total>=0?'pos-text':'neg-text'}">$${biz.total.toLocaleString()}</div></div>`;
  for(let [p, v] of Object.entries(biz.properties)) {
    g.innerHTML += `<div class="bento-card"><div class="bento-label">${p}</div><div class="bento-val ${v>=0?'pos-text':'neg-text'}">$${v.toLocaleString()}</div></div>`;
  }
}
</script>
</body>
</html>
